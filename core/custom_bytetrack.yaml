# Custom ByteTrack parameters for Sea-Bream Tracking
# Optimized for high density and boundary stability

tracker_type: bytetrack  # tracker type, ['bytetrack']
track_high_thresh: 0.15  # Rehaussé à 0.15 pour s'aligner sur le seuil YOLO de Mainfishcount.py
track_low_thresh: 0.05   # Conserve les poissons connus même si la confiance baisse fortement
new_track_thresh: 0.20   # Exige 0.20 pour créer un nouvel ID stable
track_buffer: 240        # Toujours 8 secondes de mémoire pour passer les longues occlusions
match_thresh: 0.78       # Serré de 0.85 à 0.78 pour interdire le vol d'identité lors des croisements
fuse_score: True        
