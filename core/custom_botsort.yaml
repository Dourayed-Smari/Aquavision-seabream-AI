# BoT-SORT tracker defaults for AquaVision (Compatible with Ultralytics 8.4.33)
# Optimized for underwater high-density environments

tracker_type: botsort
track_high_thresh: 0.05 # Ultra-sensible pour attraper les poissons dès la 1ère image (comme ByteTrack)
track_low_thresh: 0.01 
new_track_thresh: 0.1  # Réduit de 0.2 à 0.1 pour créer les IDs instantanément
track_buffer: 120       # 4 secondes de mémoire (30fps)
match_thresh: 0.8
fuse_score: True

# BoT-SORT specifics
gmc_method: none        # Désactivé pour la performance CPU sous l'eau
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: True         # Activé pour mieux gérer les poissons qui se croisent
model: auto             # CRUCIAL : Indispensable pour éviter l'erreur 'attribute model'
